# .github/workflows/nodejs.yml
name: Node.js CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy-to-staging:
    name: Deploy to Staging
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: Staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment to Staging
        run: |
          echo "Deploying application to Staging environment..."
          echo "Application version: $(git rev-parse --short HEAD)"
          echo "Deployment to Staging successful!"

  deploy-to-production:
    name: Deploy to Production
    needs: deploy-to-staging
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment to Production
        run: |
          echo "Deploying application to Production environment..."
          echo "Application version: $(git rev-parse --short HEAD)"

      - name: Simulated health check
        run: |
          echo "Running health checks..."
          echo "Health endpoint: https://yourapp.com/health (simulated)"
          
          if (( RANDOM % 2 == 0 )); then
            echo "   Health check passed!"
            echo "Deployment to Production successful!"
          else
            echo "   Simulated health check failure!"
            echo "HTTP 500 - Service Unhealthy"
            exit 1
          fi