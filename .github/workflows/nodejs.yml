# .github/workflows/nodejs.yml
name: Node.js CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Automatically caches dependencies for faster subsequent runs

      - name: Install dependencies
        run: npm ci # 'npm ci' is faster and more reliable in CI environments than 'npm install'

      - name: Run tests
        run: npm test

  deploy-to-staging:
    name: Deploy to Staging
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: Staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment to Staging
        run: |
          echo "Deploying application to Staging environment..."
          echo "Application version: $(git rev-parse --short HEAD)"
          echo "Deployment to Staging successful!"

  deploy-to-production:
    name: Deploy to Production
    needs: deploy-to-staging
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment to Production
        run: |
          echo "Deploying application to Production environment..."
          echo "Application version: $(git rev-parse --short HEAD)"
          echo "Deployment to Production successful!"
          # In a real scenario, this would involve commands to deploy to a cloud service:
          # e.g., `aws s3 sync build/ s3://production-bucket` or `kubectl apply -f k8s-prod.yaml`